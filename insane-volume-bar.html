<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>점점 미쳐가는 볼륨바</title>
<style>
  /* ===== Windows 95 빈티지 테마 ===== */
  :root{
    --accent: #000080;            /* 타이틀바 색 (레벨 오를수록 hue drift) */
    --accent-soft: #c3c7e0;
    --face: #c0c0c0;              /* 표준 회색 페이스 */
    --hilite: #ffffff;            /* 밝은 베벨 */
    --light: #dfdfdf;
    --shadow: #808080;            /* 어두운 베벨 */
    --dark: #000000;
    --ink: #000000;
    --ink2: #404040;
    --danger: #aa0000;
    --field: #ffffff;             /* 입력 필드 흰색 */
    --desktop: #008080;           /* 클래식 청록 바탕화면 */
  }
  /* 3D 베벨: 솟음(outset) / 눌림(inset) */
  .out{ border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
        box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow); }
  .in{ border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
       box-shadow:inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--light); }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--desktop);
    color:var(--ink);
    font-family:"MS Sans Serif","Tahoma","Apple SD Gothic Neo","Malgun Gothic",-apple-system,sans-serif;
    font-size:13px;
    display:flex; align-items:center; justify-content:center;
    padding:16px;
    min-height:100%;
    overflow-x:hidden;
  }
  .wrap{ width:100%; max-width:440px; }
  .panel{
    background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow);
    padding:3px;
    position:relative;
    overflow:hidden;
  }
  .panel.shake{ animation:shake .45s cubic-bezier(.36,.07,.19,.97); }
  /* 히든 스킵 버튼: 좌상단 10x10px, 7연속 클릭 시 다음 단계로 */
  .hidden-skip{ position:absolute; top:0; left:0; width:10px; height:10px; z-index:50;
    background:transparent; cursor:default; -webkit-tap-highlight-color:transparent; }
  @keyframes shake{
    10%,90%{ transform:translateX(-2px);} 20%,80%{ transform:translateX(4px);}
    30%,50%,70%{ transform:translateX(-6px);} 40%,60%{ transform:translateX(6px);}
  }
  /* 타이틀바 */
  .topbar{ display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(90deg, var(--accent), #1084d0);
    color:#fff; padding:3px 4px 3px 6px; margin-bottom:8px; transition:background .4s; }
  .topbar .title{ font-size:13px; font-weight:700; color:#fff; letter-spacing:.2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
  /* 보조 컨트롤(음소거)은 화면 코너 — 주 조작부(슬라이더/확인)와 분리해 항상 같은 자리에 고정 */
  .topbar-right{ display:flex; align-items:center; gap:6px; flex-shrink:0; margin-left:8px; }
  .mute-btn{
    width:26px; height:24px; padding:0; margin:0; font-size:13px; line-height:1;
    background:var(--face); color:var(--ink); cursor:pointer; flex-shrink:0;
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow);
    position:relative;
  }
  /* 시각적 크기는 유지하되 탭 가능 영역은 더 넓게(모바일 터치 편의) */
  .mute-btn::after{ content:''; position:absolute; inset:-6px; }
  .mute-btn:active, .mute-btn[aria-pressed="true"]{
    border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
    box-shadow:inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--light);
  }
  .mute-btn:focus-visible{ outline:1px dotted #fff; outline-offset:1px; }
  .badge{
    font-size:11px; font-weight:700; color:var(--ink); background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    padding:1px 7px; white-space:nowrap; max-width:46vw; overflow:hidden; text-overflow:ellipsis;
  }
  .badge.pop{ animation:pop .35s ease; }
  @keyframes pop{ 0%{transform:scale(.7);opacity:.2} 60%{transform:scale(1.1)} 100%{transform:scale(1)} }
  /* 본문 패딩 */
  .content{ padding:10px 14px 12px; }
  /* 진행도 표시 (몇 단계 중 몇 번째인지) */
  .progress{ display:flex; gap:4px; align-items:center; margin:0 0 10px; }
  .progress .seg{ flex:1; height:8px; background:#9a9a9a;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .progress .seg.done{ background:#3aa856; }
  .progress .seg.cur{ background:var(--accent); animation:segPulse 1.1s ease-in-out infinite; }
  @keyframes segPulse{ 0%,100%{ filter:brightness(1); } 50%{ filter:brightness(1.5); } }
  .progress .ptext{ font-size:11px; font-weight:700; color:var(--ink2); margin-left:4px;
    white-space:nowrap; font-variant-numeric:tabular-nums; }
  .readout{ font-size:54px; font-weight:700; line-height:1; margin:2px 0 6px;
    font-variant-numeric:tabular-nums; background:var(--field);
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
    padding:8px 12px; color:#000; }
  .readout small{ font-size:26px; font-weight:700; color:var(--ink2); margin-left:2px; }
  .goal{ font-size:13px; color:var(--ink); margin-bottom:16px; }
  /* 여러 번 실패하면 나타나는 힌트 (막힘 방지) */
  .hintbar{ font-size:12px; line-height:1.45; color:#5a4a00; background:#fffbe0;
    border:1px solid #d9c34a; padding:7px 10px; margin:-6px 0 14px; }
  .hintbar b{ color:#000; }
  .stage{ min-height:96px; display:flex; flex-direction:column; justify-content:center; margin-bottom:6px; }

  /* 커스텀 슬라이더 (Win95 트랙바) */
  .slider{ position:relative; height:42px; touch-action:none; user-select:none; margin:12px 0; }
  .slider .track{ position:absolute; top:50%; left:0; right:0; height:6px; transform:translateY(-50%);
    background:#9a9a9a;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .slider .fill{ position:absolute; top:50%; left:0; height:6px; transform:translateY(-50%);
    background:var(--accent); transition:background .4s; }
  .slider .knob{
    position:absolute; top:50%; width:20px; height:30px;
    background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow);
    transform:translate(-50%,-50%);
    cursor:grab; touch-action:none;
  }
  .slider .knob:active{ cursor:grabbing; }
  .slider .knob:focus-visible{ outline:1px dotted #000; outline-offset:2px; }

  .btn{
    display:block; width:100%; padding:9px;
    font-family:inherit; font-size:14px; font-weight:700; color:var(--ink);
    background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow);
    cursor:pointer; margin-top:10px;
  }
  .btn:active{ border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
    box-shadow:inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--light); }
  .btn:focus-visible{ outline:1px dotted #000; outline-offset:-5px; }
  .btn.secondary{ font-weight:400; }
  .btn.small{ width:auto; padding:5px 12px; font-size:13px; display:inline-block; }
  /* 목표 도달 시 확인 버튼이 "지금 누르세요" 신호 */
  .btn.ready{ background:#d6f0d6; color:#0a5a1e; animation:readyPulse 1s ease-in-out infinite; }
  @keyframes readyPulse{ 0%,100%{ background:#d6f0d6; } 50%{ background:#9fe0a6; } }

  .taunt{ min-height:18px; text-align:center; font-size:13px; margin-top:12px; font-weight:700; color:var(--ink); }
  .taunt.fail{ color:var(--danger); }
  .taunt.win{ color:#006000; }

  /* 맞춰야 할 목표값 강조 */
  .goal-target{ display:inline-block; font-weight:800; color:#000;
    background:#ffe14d; border:1px solid #b89a00; border-radius:2px;
    padding:0 7px; margin:0 1px; font-size:16px; line-height:1.5;
    box-shadow:1px 1px 0 rgba(0,0,0,.25); }
  /* 현재값이 목표와 일치할 때(도달) — 초록 강조 + 체크 */
  .readout.hit{ color:#0a7a25; }
  .target-badge{ font-size:12px; font-weight:700; color:var(--ink2); margin:-2px 0 8px; }
  .target-badge b{ color:#000; background:#ffe14d; border:1px solid #b89a00;
    padding:0 6px; border-radius:2px; font-size:14px; }
  .target-badge .ok{ color:#0a7a25; margin-left:6px; }

  /* 룰렛 */
  .reel{ font-size:60px; font-weight:700; text-align:center;
    font-variant-numeric:tabular-nums; background:#000; color:#33ff66;
    font-family:"Courier New",monospace; padding:6px;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  /* 미로 */
  .maze{ display:grid; grid-template-columns:repeat(10,1fr); gap:3px; }
  .maze label{ font-size:11px; text-align:center; padding:5px 0;
    background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--shadow) var(--shadow) var(--hilite);
    cursor:pointer; user-select:none; }
  .maze label:hover{ background:#d4d0c8; }
  .maze label.sel{ background:#000080; color:#fff; }
  .maze input{ position:absolute; opacity:0; pointer-events:none; }
  /* 모스 / 입력류 */
  .row{ display:flex; gap:8px; }
  .row .btn{ margin-top:0; }
  .hint{ font-size:12px; color:var(--ink2); text-align:center; margin-top:10px; }
  .display-mono{ font-family:"Courier New",monospace; font-size:20px; text-align:center;
    min-height:26px; letter-spacing:4px; background:var(--field);
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
    padding:4px; }
  /* 규칙 폭탄 */
  .rules{ list-style:none; padding:0; margin:8px 0 0; font-size:12px; }
  .rules li{ padding:5px 8px; margin-bottom:4px; background:var(--field);
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .rules li.ok{ background:#d6f0d6; color:#006000; }
  .rules li.bad{ background:#f0d6d6; color:var(--danger); }
  /* 달 */
  .moons{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .moons button{ font-size:26px; background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow);
    width:46px; height:46px; cursor:pointer; }
  .moons button:active{ border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .locked-note{ text-align:center; font-size:13px; color:var(--ink); }
  /* 보스 */
  .boss-head{ text-align:center; margin-bottom:6px; }
  .monster{ font-size:50px; line-height:1; display:inline-block; transition:transform .15s; }
  .monster.hit{ animation:hit .4s; }
  @keyframes hit{ 0%{transform:scale(1)} 30%{transform:scale(1.4) rotate(-8deg); filter:brightness(2)} 100%{transform:scale(1)} }
  .hp{ font-size:18px; letter-spacing:3px; margin-top:4px; }
  .ending{ text-align:center; padding:8px 4px; }
  .ending .big{ font-size:22px; font-weight:700; margin:6px 0; }
  .ending .sub{ font-size:13px; color:var(--ink); }
  .ending .cert{ font-size:12px; color:#000080; margin:14px 0; font-style:italic; }
  /* 꽃가루 */
  .confetti{ position:fixed; top:-10px; width:8px; height:12px; opacity:.95; z-index:50; pointer-events:none; }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(720deg); opacity:.8; } }

  /* ===== 레벨별 플레이버 ===== */
  /* 눈금자 (LV1/LV2) */
  .ticks{ display:flex; justify-content:space-between; font-size:10px; color:var(--ink2);
    margin-top:-4px; font-variant-numeric:tabular-nums; padding:0 2px; }
  .ticks.rev{ flex-direction:row-reverse; }
  /* 노브 위 글리프 */
  .knob[data-ico]::after{ content:attr(data-ico); position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center; font-size:13px; }
  /* LV3 빙판 */
  .slider.ice .track{ background:repeating-linear-gradient(115deg,#cfeaff,#cfeaff 8px,#a9d6ff 8px,#a9d6ff 16px);
    border-color:#7fb0e0 #fff #fff #7fb0e0; }
  .slider.ice .fill{ background:rgba(120,180,255,.5); }
  /* LV4 새총 고무줄 */
  .band{ position:absolute; top:50%; height:2px; background:#553; transform-origin:left center; pointer-events:none; }
  .anchor{ position:absolute; top:50%; width:8px; height:18px; background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    transform:translateY(-50%); }
  /* LV6 글리치 LCD */
  .readout.glitch{ color:#aa0000; text-shadow:1.5px 0 #00d, -1.5px 0 #d00; animation:glitch .14s steps(2,end) infinite; }
  @keyframes glitch{ 0%{transform:translate(0,0)} 33%{transform:translate(-1.5px,1px)} 66%{transform:translate(1.5px,-1px)} 100%{transform:translate(0,0)} }
  .fakebadge{ display:inline-block; font-size:10px; vertical-align:middle; background:#d6f0d6;
    color:#006000; border:1px solid #5a5; padding:0 5px; margin-left:8px; font-weight:700; }
  /* LV7 슬롯머신 */
  .slot{ background:#222; padding:8px 10px; display:flex; gap:6px; justify-content:center;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .slot .win-pin{ color:#ffcc00; align-self:center; font-size:18px; }
  .jackpot{ text-align:center; font-size:11px; color:#b8860b; font-weight:700; margin-top:4px; letter-spacing:1px; }
  /* LV8 탐색기 */
  .explorer{ background:var(--field); padding:6px;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
    max-height:240px; overflow:auto; }
  .explorer .winhead{ display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(90deg,var(--accent),#1084d0); color:#fff; font-size:11px;
    padding:2px 6px; margin:-6px -6px 6px; }
  /* LV10 설치 마법사 체크리스트 */
  .rules li{ display:flex; gap:6px; align-items:center; }
  .rules li::before{ content:'☐'; font-size:14px; }
  .rules li.ok::before{ content:'☑'; color:#006000; }
  .rules li.bad::before{ content:'⚠'; color:var(--danger); }
  /* LV11 잠금 다이얼로그 */
  .lockwin{ text-align:center; }
  .lockwin .lockbar{ background:linear-gradient(90deg,#7a0000,#c01818); color:#fff;
    font-size:11px; padding:2px 6px; margin-bottom:8px; text-align:left; }
  /* LV12 풍선 */
  .balloon-stage{ text-align:center; }
  .balloon-stage .balloon{ display:inline-block; line-height:1; transition:transform .08s; transform-origin:bottom center; }
  .balloon-stage .target{ font-size:11px; color:var(--ink2); margin-top:4px; }
  .pump{ background:#d8d4c0 !important; }
  /* LV13 진자 */
  .pendulum{ position:relative; height:120px; margin:4px 0; }
  .pendulum svg{ position:absolute; inset:0; width:100%; height:100%; }
  /* LV14 색 믹서 */
  .swatch-big{ height:40px; border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .hexval{ font-family:"Courier New",monospace; text-align:center; font-size:15px; font-weight:700;
    margin:6px 0 2px; letter-spacing:1px; }
  .chan-tag{ width:16px; font-weight:700; text-align:center; }
  /* LV 랜턴 (암흑 + 손전등) */
  .lantern{ position:relative; height:230px; background:#000; overflow:hidden;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .lantern .num{ position:absolute; font-family:"Courier New",monospace; font-weight:700;
    font-size:19px; color:#bdbdbd; cursor:pointer; padding:4px 7px; user-select:none;
    transform:translate(-50%,-50%); }
  .lantern .num.sel{ color:#ffd23f; text-shadow:0 0 7px #ffd23f; }
  .lantern .beam{ position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle 64px at var(--mx,50%) var(--my,50%),
      rgba(0,0,0,0) 0%, rgba(0,0,0,.6) 55%, #000 100%); }
  /* 엔딩 = 시스템 종료 화면 */
  .shutdown{ background:var(--accent); color:#fff; text-align:center; padding:24px 10px; margin:-4px; }
  .shutdown .logo{ font-size:40px; }

  @media (prefers-reduced-motion: reduce){
    .panel.shake{ animation:none; }
    .monster.hit{ animation:none; }
    .badge.pop{ animation:none; }
    .readout.glitch{ animation:none; }
    .confetti{ display:none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel" id="panel">
    <div class="hidden-skip" id="hiddenSkip" aria-hidden="true"></div>
    <div class="topbar">
      <span class="title">🔊 설정 · 소리</span>
      <div class="topbar-right">
        <span class="badge" id="badge">LV.1 정상</span>
        <button class="mute-btn" id="muteBtn" type="button" title="음소거" aria-pressed="false" aria-label="음소거">🔊</button>
      </div>
    </div>
    <div class="content">
      <div class="progress" id="progress" aria-label="진행도"></div>
      <div class="readout" id="readout">0<small>%</small></div>
      <div class="goal" id="goal">볼륨을 50%에 맞추고 확인을 누르세요.</div>
      <div class="hintbar" id="hintbar" hidden></div>
      <div class="stage" id="stage"></div>
      <button class="btn" id="confirm">확인</button>
      <div class="taunt" id="taunt"></div>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============ 상수 ============ */
const TARGET = 50;            // 기본/폴백 목표값
const SEED = 12345;           // 랜덤 레벨 시드 고정 옵션
const HUE_START = 212, HUE_END = 320;

/* ============ 시드 랜덤 ============ */
let _seed = SEED;
function srand(){ _seed = (_seed*1103515245 + 12345) & 0x7fffffff; return _seed/0x7fffffff; }
const rnd = Math.random; // 게임플레이용 진짜 랜덤(룰렛 등)

/* 레벨마다 맞춰야 할 목표 볼륨%를 랜덤 추첨 (25~75, 5단위 → 모든 레벨에서 도달 가능) */
function pickTarget(){ return 25 + Math.floor(rnd()*11)*5; }

/* ============ BGM (레벨별 6곡, 반복재생) + 8비트 버튼 SFX ============ */
// 레벨 순서(LV.1~LV.6)에 맞춰 1곡씩 매칭. (3번째 파일은 원본명이 gbm3.mp3 라 그대로 사용)
const BGM_FILES = ['bgm1.mp3','bgm2.mp3','gbm3.mp3','bgm4.mp3','bgm5.mp3','bgm6.mp3'];
const bgmEls = BGM_FILES.map(f=>{ const a=new Audio(f); a.loop=true; a.preload='auto'; a.volume=0.5; return a; });
let currentBgm=null, audioUnlocked=false;
let muted=false, lastVol=0.5;   // 음소거 시에도 마지막 볼륨값을 기억해 해제 시 복원
function unlockAudio(){
  if(audioUnlocked) return; audioUnlocked=true;
  if(currentBgm && !muted) currentBgm.play().catch(()=>{});
}
['pointerdown','keydown'].forEach(ev=>addEventListener(ev, unlockAudio, {once:true}));
function playBgmFor(idx){
  const next = bgmEls[idx % bgmEls.length];
  if(currentBgm && currentBgm!==next){ currentBgm.pause(); currentBgm.currentTime=0; }
  currentBgm = next;
  currentBgm.volume = muted ? 0 : lastVol;
  if(audioUnlocked && !muted) currentBgm.play().catch(()=>{});
}
function setBgmVolumeFromDisplay(v){
  if(v==null || isNaN(v)) return;
  lastVol = Math.max(0, Math.min(100, v))/100;             // 볼륨 조절 값 = 실제 BGM 크기
  if(currentBgm) currentBgm.volume = muted ? 0 : lastVol;
}
function stopBgm(){ if(currentBgm){ currentBgm.pause(); } }

let sfxCtx=null;
function sfx8bit(freq=880, dur=0.05){
  if(muted) return;
  try{
    sfxCtx = sfxCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o=sfxCtx.createOscillator(), g=sfxCtx.createGain();
    o.type='square'; o.frequency.value=freq; g.gain.value=0.06;
    g.gain.setValueAtTime(0.06, sfxCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, sfxCtx.currentTime+dur);
    o.connect(g); g.connect(sfxCtx.destination);
    o.start(); o.stop(sfxCtx.currentTime+dur);
  }catch(e){}
}
document.addEventListener('pointerdown', e=>{
  if(e.target.closest('button, .knob, label')) sfx8bit(720 + Math.random()*180, 0.05);
});

/* 음소거 토글 버튼 */
const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', ()=>{
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  muteBtn.setAttribute('aria-pressed', String(muted));
  muteBtn.setAttribute('aria-label', muted ? '음소거 해제' : '음소거');
  if(currentBgm){
    if(muted){ currentBgm.volume = 0; }
    else { currentBgm.volume = lastVol; if(audioUnlocked) currentBgm.play().catch(()=>{}); }
  }
});

/* ============ DOM ============ */

/* ============ 상태 ============ */
let state = {};
let rafId = null;        // 현재 레벨 애니메이션 루프
let level = null;        // 현재 레벨 정의

/* ============ 공통 유틸 ============ */
function setAccentHue(idx, total){
  const hue = HUE_START + (HUE_END - HUE_START) * (idx/(total-1));
  document.documentElement.style.setProperty('--accent', `hsl(${hue} 88% 52%)`);
  document.documentElement.style.setProperty('--accent-soft', `hsl(${hue} 88% 52% / .14)`);
}
function setReadout(v){
  const r = Math.round(v);
  const hit = (state && state.target!=null && r===state.target);
  readoutEl.innerHTML = `${r}<small>%</small>` + (hit ? ' <small style="color:#0a7a25">✓</small>' : '');
  readoutEl.classList.toggle('hit', !!hit);
  // 확인 버튼이 "지금이야!" 신호를 주도록 (액션 어포던스)
  confirmBtn.classList.toggle('ready', !!hit);
  confirmBtn.textContent = hit ? '확인 ✓' : '확인';
  // 목표에 닿는 순간, 이전 실패 메시지(빨간 도발)가 남아 모순돼 보이는 문제 제거
  if(hit && tauntEl.classList.contains('fail')){ tauntEl.textContent=''; tauntEl.className='taunt'; }
  setBgmVolumeFromDisplay(v);   // 표시값 그대로 실제 BGM 음량에 반영
}
/* 막힘 방지용 힌트 (레벨 이름 키워드로 매칭) */
const HINTS = [
  ['반전', '손잡이가 마우스와 <b>반대로</b> 움직여요. 원하는 방향의 <b>반대쪽</b>으로 미세요.'],
  ['미끄럼', '손을 떼면 값이 <b>스르륵 줄어들어요</b>. 목표에 닿는 순간 떼지 말고 바로 <b>확인</b>!'],
  ['새총', '당겼다 놓으면 <b>관성</b>으로 미끄러져요. 목표 근처에서 <b>아주 살살</b> 놓으세요.'],
  ['도망', '커서가 다가가면 손잡이가 <b>도망</b>가요. 화면 끝으로 몰거나 재빨리 잡으세요.'],
  ['미로', '뒤섞인 숫자 중 <b>목표 숫자</b>를 찾아 클릭하면 돼요.'],

function showHint(){

  hb.hidden=false;
}
function updateProgress(idx){
  const total = LEVELS.length;
  const p = document.getElementById('progress');
  let segs='';
  for(let i=0;i<total;i++){
    const cls = i<idx ? 'done' : (i===idx ? 'cur' : '');
    segs += `<span class="seg ${cls}"></span>`;
  }
  p.innerHTML = segs + `<span class="ptext">${idx+1} / ${total}</span>`;
}
function shake(){
  if(reduceMotion) return;
  panel.classList.remove('shake'); void panel.offsetWidth; panel.classList.add('shake');
}
function taunt(msg, kind){
  tauntEl.textContent = msg;
  tauntEl.className = 'taunt' + (kind ? ' '+kind : '');
}
function clearRaf(){ if(rafId){ cancelAnimationFrame(rafId); rafId=null; } }

/* 커스텀 슬라이더 생성기.
   opts: { reversed, slip, runaway, offset, onChange }
   value(0~100) 보관. 표시값 = reversed? 100-value : value, + offset */
function makeSlider(opts={}){
  const el = document.createElement('div');
  el.className = 'slider';
  el.innerHTML = `<div class="track"></div><div class="fill"></div>
    <div class="knob" tabindex="0" role="slider" aria-label="볼륨" aria-valuemin="0" aria-valuemax="100"></div>`;
  const track = el.querySelector('.track');
  const fill = el.querySelector('.fill');
  const knob = el.querySelector('.knob');
  const s = { el, knob, value:(opts.start!=null?opts.start:50), dragging:false, opts,  // 손잡이는 중앙(50)에서 시작
    displayValue(){
      let v = opts.reversed ? 100 - this.value : this.value;
      v += (opts.offset||0);
      return v;
    },
    setValue(v){ this.value = Math.max(0, Math.min(100, v)); render(); }
  };
  function render(){
    const w = el.clientWidth || 300;
    const px = (s.value/100) * w;
    knob.style.left = px + 'px';
    fill.style.width = px + 'px';
    knob.setAttribute('aria-valuenow', Math.round(s.displayValue()));
    if(opts.onChange) opts.onChange(s);
  }
  s.render = render;
  function valueFromX(clientX){
    const r = el.getBoundingClientRect();
    const raw = Math.max(0, Math.min(100, ((clientX - r.left)/r.width)*100));
    return opts.invert ? 100 - raw : raw;   // invert=손잡이가 마우스 방향과 반대로 이동
  }
  knob.addEventListener('pointerdown', e=>{
    e.preventDefault();
    knob.setPointerCapture(e.pointerId);
    s.dragging = true;
  });
  el.addEventListener('pointermove', e=>{
    if(!s.dragging) return;
    s.setValue(valueFromX(e.clientX));
  });
  function endDrag(e){ if(s.dragging){ s.dragging=false; if(opts.onRelease) opts.onRelease(s);} }
  knob.addEventListener('pointerup', endDrag);
  knob.addEventListener('pointercancel', endDrag);
  // 키보드
  knob.addEventListener('keydown', e=>{
    let d=0;
    if(e.key==='ArrowRight'||e.key==='ArrowUp') d=2;
    if(e.key==='ArrowLeft'||e.key==='ArrowDown') d=-2;
    if(d){ e.preventDefault(); if(opts.invert||opts.reversed) d=-d; s.setValue(s.value + d); }
  });
  requestAnimationFrame(render);
  return s;
}

/* 눈금자 행 (rev=역방향) */
function tickRow(rev){
  const d=document.createElement('div'); d.className='ticks'+(rev?' rev':'');
  d.innerHTML='<span>0</span><span>50</span><span>100</span>';
  return d;
}

/* 꽃가루 */
function confetti(){
  if(reduceMotion) return;
  const colors = ['#ff3b30','#ff9500','#ffcc00','#34c759','#007aff','#af52de','#ff2d55'];
  for(let i=0;i<80;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.background = colors[i%colors.length];
    c.style.animation = `fall ${1.6+Math.random()*1.8}s linear ${Math.random()*.6}s forwards`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 4500);
  }
}

/* ============ 레벨 정의 ============
   각 레벨: { name, goal, build(stage)->설정, getDisplay()->표시값 or null(자체 win),
              win() optional override, onConfirm() optional, pass(통과도발) } */
const LEVELS = [
/* LV.2 반전 (손잡이가 마우스 방향과 반대로 이동) */{
  name:'LV.1 좌우반전',
  pass:'왼쪽이 오른쪽이고 오른쪽이 왼쪽이에요. 화이팅.',
  build(){
    const sl = makeSlider({ invert:true, onChange:s=>setReadout(s.displayValue()) });
    sl.knob.setAttribute('data-ico','⇄');
    stage.appendChild(sl.el);
    stage.appendChild(tickRow(true));   // 거울 반전된 눈금
    state.sl = sl;
  },
  getDisplay(){ return state.sl.displayValue(); }
},
/* 2: LV.3 미끄럼 */{
  name:'LV.2 미끄럼틀',
  pass:'손 떼는 순간 다 잃는 거예요. 인생처럼.',
  build(){
    const sl = makeSlider({ onChange:s=>setReadout(s.displayValue()) });
    sl.el.classList.add('ice');          // 빙판 트랙
    sl.knob.setAttribute('data-ico','❄');
    stage.appendChild(sl.el); state.sl = sl;
    let last = performance.now();
    function loop(t){
      const dt = (t-last)/1000; last=t;
      if(!sl.dragging && sl.value>0){
        sl.setValue(sl.value - 10.5*dt);   // 약 10.5/초 감소 (기존 35에서 70% 감소)
      }
      rafId = requestAnimationFrame(loop);
    }
    rafId = requestAnimationFrame(loop);
  },
  getDisplay(){ return state.sl.displayValue(); }
},
/* 3: LV.4 새총 */{
  name:'LV.3 새총',
  pass:'이걸 맞추네… 운이 좋으시네요.',
  fail:'50 근처에도 못 갔는데요?',
  build(){
    const sl = makeSlider({ onChange:s=>setReadout(s.displayValue()) });
    sl.knob.setAttribute('data-ico','✊');
    stage.appendChild(sl.el); state.sl = sl;
    // 고무줄: 왼쪽 앵커 → 손잡이
    const anchor=document.createElement('div'); anchor.className='anchor'; anchor.style.left='0px';
    const band=document.createElement('div'); band.className='band';
    sl.el.append(anchor, band);
    function drawBand(){
      const kx=parseFloat(sl.knob.style.left)||0;
      const len=Math.max(0,kx);
      band.style.width=len+'px'; band.style.left='2px';
    }
    let vel = 0, last=performance.now(), prevVal=0, prevT=last;
    sl.opts.onChange = s=>{ setReadout(s.displayValue()); drawBand();
      const now=performance.now(); const dt=(now-prevT)/1000;
      if(dt>0 && s.dragging){ vel = (s.value-prevVal)/dt * 1.3; }  // 30% 더 민감하게
      prevVal=s.value; prevT=now;
    };
    requestAnimationFrame(drawBand);
    sl.opts.onRelease = ()=>{ /* 관성 발사: vel 유지 */ };
    function loop(t){
      const dt=Math.min(0.05,(t-last)/1000); last=t;
      if(!sl.dragging){
        sl.value = Math.max(0,Math.min(100, sl.value + vel*dt));
        vel *= Math.pow(0.12, dt);  // 마찰
        if(Math.abs(vel)<0.5) vel=0;
        sl.render();
      }
      rafId=requestAnimationFrame(loop);
    }
    rafId=requestAnimationFrame(loop);
  },
  getDisplay(){ return state.sl.displayValue(); },
  win(d){ return Math.round(d)===state.target; }   // 정확히 목표값 (예민)
},
/* 4: LV.5 도망 */{
  name:'LV.4 도망',
  pass:'버튼도 가끔은 당신을 피하고 싶어요.',
  build(){
    const sl = makeSlider({ onChange:s=>setReadout(s.displayValue()) });
    sl.knob.setAttribute('data-ico','🙂');
    stage.appendChild(sl.el); state.sl = sl;
    let calm;
    sl.el.addEventListener('pointermove', e=>{
      if(sl.dragging){ sl.knob.setAttribute('data-ico','😆'); return; }
      const r = sl.el.getBoundingClientRect();
      const knobX = r.left + (sl.value/100)*r.width;
      const dist = e.clientX - knobX;
      if(Math.abs(dist) < 60){
        sl.knob.setAttribute('data-ico','😨');           // 놀란 표정
        clearTimeout(calm); calm=setTimeout(()=>sl.knob.setAttribute('data-ico','🙂'),500);
        const push = dist>0 ? -1 : 1;                     // 반대로 도망(양 끝에선 잡힘)
        sl.setValue(sl.value + push*4);
      }
    });
  },
  getDisplay(){ return state.sl.displayValue(); }
},
/* LV.8 라디오 미로 */{
  name:'LV.5 미로',
  pass:'이 안에 50이 있긴 했죠? 거 봐요.',
  build(){
    state.picked = null;
    const win=document.createElement('div'); win.className='explorer';
    const head=document.createElement('div'); head.className='winhead';
    head.innerHTML='<span>🗂️ 볼륨 찾기 - 탐색기</span><span>▭ ✕</span>';
    const grid = document.createElement('div'); grid.className='maze';
    const nums=[...Array(100).keys()];
    for(let i=nums.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [nums[i],nums[j]]=[nums[j],nums[i]]; }
    nums.forEach(n=>{
      const lab=document.createElement('label');
      lab.innerHTML=`<input type="radio" name="maze" value="${n}">${n}`;
      lab.querySelector('input').onchange=()=>{
        grid.querySelectorAll('label').forEach(l=>l.classList.remove('sel'));
        lab.classList.add('sel'); state.picked=n;
      };
      grid.appendChild(lab);
    });
    win.append(head, grid);
    stage.appendChild(win);
    setReadout(0);
  },
  getDisplay(){ return state.picked==null ? -1 : state.picked; }
},
/* LV.15 랜턴 — 암흑 속 숫자 조합 */{
  name:'LV.6 랜턴',
  pass:'어둠 속에서도 숫자는 거짓말 안 하죠.',
  build(){
    goalEl.innerHTML=`어둠 속 숫자를 마우스로 비춰 찾고, 합이 <span class="goal-target">${state.target}%</span>가 되도록 고르세요.`;
    state.sum=0; state.selected=new Set();
    const box=document.createElement('div'); box.className='lantern';
    const vals=[5,10,15,20,25,5,10,15,20,25];   // 모든 숫자가 2개씩
    for(let i=vals.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [vals[i],vals[j]]=[vals[j],vals[i]]; }
    vals.forEach(v=>{
      const n=document.createElement('div'); n.className='num'; n.textContent=v;
      n.style.left=(10+rnd()*80)+'%'; n.style.top=(12+rnd()*76)+'%';
      n.onclick=()=>{
        if(state.selected.has(n)){ state.selected.delete(n); n.classList.remove('sel'); }
        else { state.selected.add(n); n.classList.add('sel'); }
        state.sum=[...state.selected].reduce((a,e)=>a+ +e.textContent,0);
        setReadout(state.sum);
      };
      box.appendChild(n);
    });
    const beam=document.createElement('div'); beam.className='beam'; box.appendChild(beam);
    box.addEventListener('pointermove', e=>{
      const r=box.getBoundingClientRect();
      beam.style.setProperty('--mx',(e.clientX-r.left)+'px');
      beam.style.setProperty('--my',(e.clientY-r.top)+'px');
    });
    stage.appendChild(box);
    const clr=document.createElement('button'); clr.className='btn small secondary'; clr.textContent='선택 초기화';
    clr.style.marginTop='10px';
    clr.onclick=()=>{ state.selected.forEach(n=>n.classList.remove('sel')); state.selected.clear(); state.sum=0; setReadout(0); };
    stage.appendChild(clr);

  },
  getDisplay(){ return state.sum; }
}
];
/* (LV.15 볼륨 몬스터 보스 — 삭제됨. 마지막 레벨 통과 시 바로 엔딩) */

function showEnding(){
  clearRaf();
  stopBgm();   // 정복 완료 = 진짜 음소거
  confirmBtn.style.display='none';
  confirmBtn.classList.remove('ready');
  badge.textContent='CLEAR';
  document.getElementById('progress').innerHTML =
    Array.from({length:LEVELS.length},()=>'<span class="seg done"></span>').join('')
    + '<span class="ptext">CLEAR!</span>';
  goalEl.textContent='';
  readoutEl.className='readout';
  readoutEl.innerHTML='🔇';
  stage.innerHTML='';
  const e=document.createElement('div'); e.className='ending';
  e.innerHTML=`<div class="shutdown">
      <div class="logo">🔇</div>
      <div class="big" style="color:#fff">볼륨 정복 완료</div>
      <div class="sub" style="color:#dfe">이제 시스템을 종료해도 안전합니다.</div>
    </div>
    <div class="sub" style="margin-top:12px">당신은 세상에서 가장 쓸모없는 볼륨바를 정복했습니다.</div>
    <div class="cert">— 본 수료증은 당신의 인내심을 영원히 증명합니다 —</div>`;
  const again=document.createElement('button'); again.className='btn'; again.textContent='다시 도전';
  again.onclick=()=>loadLevel(0);
  e.appendChild(again);
  stage.appendChild(e);
  confetti();
  tauntEl.textContent='';
}

/* ============ 레벨 로딩 ============ */
function loadLevel(idx){
  if(level && level.cleanup) try{ level.cleanup(); }catch(e){}
  clearRaf();
  state = {};
  level = LEVELS[idx];
  state.levelIndex = idx;
  state.target = level.fixedTarget != null ? level.fixedTarget : pickTarget();  // 목표% 랜덤
  setAccentHue(idx, LEVELS.length);
  playBgmFor(idx);   // 레벨마다 다른 BGM 반복재생
  // UI 리셋
  confirmBtn.style.display='';
  confirmBtn.classList.remove('ready'); confirmBtn.textContent='확인';
  document.getElementById('hintbar').hidden=true;
  goalEl.innerHTML=`볼륨을 <span class="goal-target">${state.target}%</span>에 맞추고 확인을 누르세요.`;
  stage.innerHTML='';
  tauntEl.textContent=''; tauntEl.className='taunt';
  readoutEl.innerHTML='0<small>%</small>';
  readoutEl.className='readout';
  badge.textContent=level.name;
  badge.classList.remove('pop'); void badge.offsetWidth; badge.classList.add('pop');
  updateProgress(idx);
  level.build(stage);
}

confirmBtn.addEventListener('click', ()=>{
  if(level.onConfirmGuard && !level.onConfirmGuard()){
    shake(); taunt('먼저 잠금을 해제하세요.','fail'); return;
  }
  let ok;
  if(level.win){
    const d = level.getDisplay ? level.getDisplay() : null;
    ok = level.win(d);
  } else {
    const d = level.getDisplay();
    ok = Math.round(d) === state.target;
  }
  if(ok){
    advance();
  } else {
    shake();
    const d = level.getDisplay ? level.getDisplay() : null;
    const cur = (d!=null && d>=0) ? Math.round(d) : '?';
    taunt(level.fail || `${state.target}%가 아니에요. (현재 ${cur}%)`, 'fail');
    if(level.onFail) level.onFail();
    state.fails = (state.fails||0) + 1;     // 3번 이상 실패하면 힌트 노출
    if(state.fails >= 3) showHint();
  }
});

/* 통과 → 다음 레벨/엔딩 */
function advance(){
  taunt(level.pass || '', 'win');
  const next = state.levelIndex + 1;
  if(next < LEVELS.length) setTimeout(()=>loadLevel(next), 850);
  else setTimeout(showEnding, 850);
}

/* 히든 스킵: 좌상단 10x10px를 7연속 클릭하면 다음 단계로 (보스/엔딩 없으므로 advance만 사용) */
(function hiddenSkip(){
  const spot = document.getElementById('hiddenSkip');
  let count = 0, resetTimer = null;
  const RESET_MS = 1200;     // 이 시간 안에 다음 클릭이 없으면 카운트 초기화
  spot.addEventListener('pointerdown', e=>{
    e.stopPropagation();
    count++;
    clearTimeout(resetTimer);
    if(count >= 7){
      count = 0;
      if(badge.textContent !== 'CLEAR') advance();
    } else {
      resetTimer = setTimeout(()=>{ count = 0; }, RESET_MS);
    }
  });
})();

/* 시작 */
loadLevel(0);
</script>
