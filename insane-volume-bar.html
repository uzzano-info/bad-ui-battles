<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>점점 미쳐가는 볼륨바</title>
<style>
  /* ===== Windows 95 빈티지 테마 ===== */
  :root{
    --accent: #000080;            /* 타이틀바 색 (레벨 오를수록 hue drift) */
    --accent-soft: #c3c7e0;
    --face: #c0c0c0;              /* 표준 회색 페이스 */
    --hilite: #ffffff;            /* 밝은 베벨 */
    --light: #dfdfdf;
    --shadow: #808080;            /* 어두운 베벨 */
    --dark: #000000;
    --ink: #000000;
    --ink2: #404040;
    --danger: #aa0000;
    --field: #ffffff;             /* 입력 필드 흰색 */
    --desktop: #008080;           /* 클래식 청록 바탕화면 */
  }
  /* 3D 베벨: 솟음(outset) / 눌림(inset) */
  .out{ border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
        box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow); }
  .in{ border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
       box-shadow:inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--light); }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--desktop);
    color:var(--ink);
    font-family:"MS Sans Serif","Tahoma","Apple SD Gothic Neo","Malgun Gothic",-apple-system,sans-serif;
    font-size:13px;
    display:flex; align-items:center; justify-content:center;
    padding:16px;
    min-height:100%;
    overflow-x:hidden;
  }
  .wrap{ width:100%; max-width:440px; }
  .panel{
    background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow);
    padding:3px;
    position:relative;
    overflow:hidden;
  }
  .panel.shake{ animation:shake .45s cubic-bezier(.36,.07,.19,.97); }
  /* 히든 스킵 버튼: 좌상단 10x10px, 7연속 클릭 시 다음 단계로 */
  .hidden-skip{ position:absolute; top:0; left:0; width:10px; height:10px; z-index:50;
    background:transparent; cursor:default; -webkit-tap-highlight-color:transparent; }
  @keyframes shake{
    10%,90%{ transform:translateX(-2px);} 20%,80%{ transform:translateX(4px);}
    30%,50%,70%{ transform:translateX(-6px);} 40%,60%{ transform:translateX(6px);}
  }
  /* 타이틀바 */
  .topbar{ display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(90deg, var(--accent), #1084d0);
    color:#fff; padding:3px 4px 3px 6px; margin-bottom:8px; transition:background .4s; }
  .topbar .title{ font-size:13px; font-weight:700; color:#fff; letter-spacing:.2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
  /* 보조 컨트롤(음소거)은 화면 코너 — 주 조작부(슬라이더/확인)와 분리해 항상 같은 자리에 고정 */
  .topbar-right{ display:flex; align-items:center; gap:6px; flex-shrink:0; margin-left:8px; }
  .mute-btn{
    width:26px; height:24px; padding:0; margin:0; font-size:13px; line-height:1;
    background:var(--face); color:var(--ink); cursor:pointer; flex-shrink:0;
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow);
    position:relative;
  }
  /* 시각적 크기는 유지하되 탭 가능 영역은 더 넓게(모바일 터치 편의) */
  .mute-btn::after{ content:''; position:absolute; inset:-6px; }
  .mute-btn:active, .mute-btn[aria-pressed="true"]{
    border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
    box-shadow:inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--light);
  }
  .mute-btn:focus-visible{ outline:1px dotted #fff; outline-offset:1px; }
  .badge{
    font-size:11px; font-weight:700; color:var(--ink); background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    padding:1px 7px; white-space:nowrap; max-width:46vw; overflow:hidden; text-overflow:ellipsis;
  }
  .badge.pop{ animation:pop .35s ease; }
  @keyframes pop{ 0%{transform:scale(.7);opacity:.2} 60%{transform:scale(1.1)} 100%{transform:scale(1)} }
  /* 본문 패딩 */
  .content{ padding:10px 14px 12px; }
  /* 진행도 표시 (몇 단계 중 몇 번째인지) */
  .progress{ display:flex; gap:4px; align-items:center; margin:0 0 10px; }
  .progress .seg{ flex:1; height:8px; background:#9a9a9a;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .progress .seg.done{ background:#3aa856; }
  .progress .seg.cur{ background:var(--accent); animation:segPulse 1.1s ease-in-out infinite; }
  @keyframes segPulse{ 0%,100%{ filter:brightness(1); } 50%{ filter:brightness(1.5); } }
  .progress .ptext{ font-size:11px; font-weight:700; color:var(--ink2); margin-left:4px;
    white-space:nowrap; font-variant-numeric:tabular-nums; }
  /* 음악 플레이어풍 볼륨 디스플레이 + VU 미터 */
  .readout{ background:var(--field); margin:2px 0 6px; padding:9px 12px 12px; color:#000;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .player-head{ display:flex; align-items:center; gap:9px; line-height:1; }
  .player-head .spk{ font-size:28px; flex-shrink:0; }
  .player-head .vnum{ font-size:50px; font-weight:700; font-variant-numeric:tabular-nums; }
  .player-head .vpct{ font-size:23px; font-weight:700; color:var(--ink2); margin-left:1px; }
  .player-head .vcheck{ margin-left:auto; font-size:26px; font-weight:700; color:#0a7a25; }
  .player-off{ font-size:46px; text-align:center; padding:6px; }
  .vumeter{ position:relative; display:flex; gap:2px; height:24px; margin-top:10px;
    background:#0d0d0d; padding:3px;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .vumeter .vseg{ flex:1 1 0; background:#1f2a1f; border-radius:1px; transition:background .05s, box-shadow .05s; }
  .vumeter .vseg.on{ background:#39d353; box-shadow:0 0 3px #39d353; }
  .vumeter .vseg.on.mid{ background:#ffd23f; box-shadow:0 0 3px #ffd23f; }
  .vumeter .vseg.on.hi{ background:#ff4d4d; box-shadow:0 0 4px #ff4d4d; }
  .vumeter .vtick{ position:absolute; top:-4px; bottom:-4px; width:3px; background:#fff;
    box-shadow:0 0 0 1px #000; transform:translateX(-50%); z-index:2; pointer-events:none; }
  .readout.hit .vumeter{ outline:2px solid #0a7a25; outline-offset:1px; }
  .goal{ font-size:13px; color:var(--ink); margin-bottom:16px; }
  /* 여러 번 실패하면 나타나는 힌트 (막힘 방지) */
  .hintbar{ font-size:12px; line-height:1.45; color:#5a4a00; background:#fffbe0;
    border:1px solid #d9c34a; padding:7px 10px; margin:-6px 0 14px; }
  .hintbar b{ color:#000; }
  .stage{ min-height:96px; display:flex; flex-direction:column; justify-content:center; margin-bottom:6px; }

  /* 커스텀 슬라이더 (Win95 트랙바) */
  .slider{ position:relative; height:42px; touch-action:none; user-select:none; margin:12px 0; }
  .slider .track{ position:absolute; top:50%; left:0; right:0; height:6px; transform:translateY(-50%);
    background:#9a9a9a;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .slider .fill{ position:absolute; top:50%; left:0; height:6px; transform:translateY(-50%);
    background:var(--accent); transition:background .4s; }
  .slider .knob{
    position:absolute; top:50%; width:20px; height:30px;
    background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow);
    transform:translate(-50%,-50%);
    cursor:grab; touch-action:none;
  }
  .slider .knob:active{ cursor:grabbing; }
  .slider .knob:focus-visible{ outline:1px dotted #000; outline-offset:2px; }

  .btn{
    display:block; width:100%; padding:9px;
    font-family:inherit; font-size:14px; font-weight:700; color:var(--ink);
    background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow);
    cursor:pointer; margin-top:10px;
  }
  .btn:active{ border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
    box-shadow:inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--light); }
  .btn:focus-visible{ outline:1px dotted #000; outline-offset:-5px; }
  .btn.secondary{ font-weight:400; }
  .btn.small{ width:auto; padding:5px 12px; font-size:13px; display:inline-block; }
  /* 목표 도달 시 확인 버튼이 "지금 누르세요" 신호 */
  .btn.ready{ background:#d6f0d6; color:#0a5a1e; animation:readyPulse 1s ease-in-out infinite; }
  @keyframes readyPulse{ 0%,100%{ background:#d6f0d6; } 50%{ background:#9fe0a6; } }

  .taunt{ min-height:18px; text-align:center; font-size:13px; margin-top:12px; font-weight:700; color:var(--ink); }
  .taunt.fail{ color:var(--danger); }
  .taunt.win{ color:#006000; }

  /* 맞춰야 할 목표값 강조 */
  .goal-target{ display:inline-block; font-weight:800; color:#000;
    background:#ffe14d; border:1px solid #b89a00; border-radius:2px;
    padding:0 7px; margin:0 1px; font-size:16px; line-height:1.5;
    box-shadow:1px 1px 0 rgba(0,0,0,.25); }
  /* 현재값이 목표와 일치할 때(도달) — 초록 강조 + 체크 */
  .readout.hit{ color:#0a7a25; }
  .target-badge{ font-size:12px; font-weight:700; color:var(--ink2); margin:-2px 0 8px; }
  .target-badge b{ color:#000; background:#ffe14d; border:1px solid #b89a00;
    padding:0 6px; border-radius:2px; font-size:14px; }
  .target-badge .ok{ color:#0a7a25; margin-left:6px; }

  /* 룰렛 */
  .reel{ font-size:60px; font-weight:700; text-align:center;
    font-variant-numeric:tabular-nums; background:#000; color:#33ff66;
    font-family:"Courier New",monospace; padding:6px;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  /* 미로 */
  .maze{ display:grid; grid-template-columns:repeat(10,1fr); gap:3px; }
  .maze label{ font-size:11px; text-align:center; padding:5px 0;
    background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--shadow) var(--shadow) var(--hilite);
    cursor:pointer; user-select:none; }
  .maze label:hover{ background:#d4d0c8; }
  .maze label.sel{ background:#000080; color:#fff; }
  .maze input{ position:absolute; opacity:0; pointer-events:none; }
  /* 모스 / 입력류 */
  .row{ display:flex; gap:8px; }
  .row .btn{ margin-top:0; }
  .hint{ font-size:12px; color:var(--ink2); text-align:center; margin-top:10px; }
  .display-mono{ font-family:"Courier New",monospace; font-size:20px; text-align:center;
    min-height:26px; letter-spacing:4px; background:var(--field);
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
    padding:4px; }
  /* 규칙 폭탄 */
  .rules{ list-style:none; padding:0; margin:8px 0 0; font-size:12px; }
  .rules li{ padding:5px 8px; margin-bottom:4px; background:var(--field);
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .rules li.ok{ background:#d6f0d6; color:#006000; }
  .rules li.bad{ background:#f0d6d6; color:var(--danger); }
  /* 달 */
  .moons{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .moons button{ font-size:26px; background:var(--face);
    border:2px solid; border-color:var(--hilite) var(--dark) var(--dark) var(--hilite);
    box-shadow:inset 1px 1px 0 var(--face), inset -1px -1px 0 var(--shadow);
    width:46px; height:46px; cursor:pointer; }
  .moons button:active{ border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .locked-note{ text-align:center; font-size:13px; color:var(--ink); }
  /* 보스 */
  .boss-head{ text-align:center; margin-bottom:6px; }
  .monster{ font-size:50px; line-height:1; display:inline-block; transition:transform .15s; }
  .monster.hit{ animation:hit .4s; }
  @keyframes hit{ 0%{transform:scale(1)} 30%{transform:scale(1.4) rotate(-8deg); filter:brightness(2)} 100%{transform:scale(1)} }
  .hp{ font-size:18px; letter-spacing:3px; margin-top:4px; }
  .ending{ text-align:center; padding:8px 4px; }
  .ending .big{ font-size:22px; font-weight:700; margin:6px 0; }
  .ending .sub{ font-size:13px; color:var(--ink); }
  .ending .cert{ font-size:12px; color:#000080; margin:14px 0; font-style:italic; }
  /* 꽃가루 */
  .confetti{ position:fixed; top:-10px; width:8px; height:12px; opacity:.95; z-index:50; pointer-events:none; }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(720deg); opacity:.8; } }

  /* ===== 레벨별 플레이버 ===== */
  /* 눈금자 (LV1/LV2) */
  .ticks{ display:flex; justify-content:space-between; font-size:10px; color:var(--ink2);
    margin-top:-4px; font-variant-numeric:tabular-nums; padding:0 2px; }
  .ticks.rev{ flex-direction:row-reverse; }
  /* 노브 위 글리프 */
  .knob[data-ico]::after{ content:attr(data-ico); position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center; font-size:13px; }
  /* LV6 글리치 LCD */
  .readout.glitch{ color:#aa0000; text-shadow:1.5px 0 #00d, -1.5px 0 #d00; animation:glitch .14s steps(2,end) infinite; }
  @keyframes glitch{ 0%{transform:translate(0,0)} 33%{transform:translate(-1.5px,1px)} 66%{transform:translate(1.5px,-1px)} 100%{transform:translate(0,0)} }
  .fakebadge{ display:inline-block; font-size:10px; vertical-align:middle; background:#d6f0d6;
    color:#006000; border:1px solid #5a5; padding:0 5px; margin-left:8px; font-weight:700; }
  /* LV7 슬롯머신 */
  .slot{ background:#222; padding:8px 10px; display:flex; gap:6px; justify-content:center;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .slot .win-pin{ color:#ffcc00; align-self:center; font-size:18px; }
  .jackpot{ text-align:center; font-size:11px; color:#b8860b; font-weight:700; margin-top:4px; letter-spacing:1px; }
  /* LV8 탐색기 */
  .explorer{ background:var(--field); padding:6px;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow);
    max-height:240px; overflow:auto; }
  .explorer .winhead{ display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(90deg,var(--accent),#1084d0); color:#fff; font-size:11px;
    padding:2px 6px; margin:-6px -6px 6px; }
  /* LV10 설치 마법사 체크리스트 */
  .rules li{ display:flex; gap:6px; align-items:center; }
  .rules li::before{ content:'☐'; font-size:14px; }
  .rules li.ok::before{ content:'☑'; color:#006000; }
  .rules li.bad::before{ content:'⚠'; color:var(--danger); }
  /* LV11 잠금 다이얼로그 */
  .lockwin{ text-align:center; }
  .lockwin .lockbar{ background:linear-gradient(90deg,#7a0000,#c01818); color:#fff;
    font-size:11px; padding:2px 6px; margin-bottom:8px; text-align:left; }
  /* LV12 풍선 */
  .balloon-stage{ text-align:center; }
  .balloon-stage .balloon{ display:inline-block; line-height:1; transition:transform .08s; transform-origin:bottom center; }
  .balloon-stage .target{ font-size:11px; color:var(--ink2); margin-top:4px; }
  /* LV13 진자 */
  .pendulum{ position:relative; height:120px; margin:4px 0; }
  .pendulum svg{ position:absolute; inset:0; width:100%; height:100%; }
  /* LV14 색 믹서 */
  .swatch-big{ height:40px; border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .hexval{ font-family:"Courier New",monospace; text-align:center; font-size:15px; font-weight:700;
    margin:6px 0 2px; letter-spacing:1px; }
  .chan-tag{ width:16px; font-weight:700; text-align:center; }
  /* LV 랜턴 (암흑 + 손전등, 넓은 스크롤 영역) */
  .lantern-wrap{ position:relative; height:230px;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .lantern{ position:absolute; inset:0; background:#000; overflow:auto; }
  .lantern .lfield{ position:relative; width:100%; }
  .lantern .num{ position:absolute; font-family:"Courier New",monospace; font-weight:700;
    font-size:18px; color:#cfcfcf; cursor:pointer; padding:3px 6px; user-select:none;
    transform:translate(-50%,-50%); }
  .lantern .num.sel{ color:#ffd23f; text-shadow:0 0 8px #ffd23f; }
  .lantern-wrap .beam{ position:absolute; inset:0; pointer-events:none; z-index:3;
    background:radial-gradient(circle 58px at var(--mx,50%) var(--my,50%),
      rgba(0,0,0,0) 0%, rgba(0,0,0,.65) 52%, #000 100%); }
  .lantern-wrap .scrollhint{ position:absolute; right:6px; bottom:4px; z-index:4; font-size:10px;
    color:#888; pointer-events:none; }
  /* LV 일식 */
  .eclipse{ position:relative; height:170px; background:#0a0a1c; overflow:hidden;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .eclipse svg{ width:100%; height:100%; touch-action:none; display:block; }
  .eclipse #ecMoon{ cursor:grab; }
  .eclipse #ecMoon:active{ cursor:grabbing; }
  /* LV 튜브 (가로 원통 속 공, 무게 조절은 세로 드래그) */
  .tube-wrap{ position:relative; height:90px; margin:14px 0 6px; display:flex; align-items:center;
    touch-action:none; cursor:ns-resize; user-select:none; }
  .tube{ position:relative; width:100%; height:32px; border-radius:16px; transition:transform .04s;
    background:linear-gradient(180deg,#eee,#bdbdbd 45%,#909090);
    border:2px solid var(--shadow); box-shadow:inset 0 2px 3px rgba(255,255,255,.5), inset 0 -3px 4px rgba(0,0,0,.3); }
  .tube .ttarget{ position:absolute; top:-7px; bottom:-7px; width:3px; background:#0a8a30; transform:translateX(-50%); }
  .tube .tball{ position:absolute; top:50%; width:26px; height:26px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none;
    background:radial-gradient(circle at 35% 30%, #fff, var(--accent) 72%);
    border:2px solid var(--dark); box-shadow:1px 2px 3px rgba(0,0,0,.45); }
  /* LV 펌프 (세로 T손잡이 펌프) */
  .pump2{ position:relative; width:130px; height:248px; margin:6px auto 2px; touch-action:none; user-select:none; }
  .pump2 .p-handle{ position:absolute; left:50%; top:0; transform:translateX(-50%); cursor:grab; z-index:1; will-change:transform; }
  .pump2 .p-handle:active{ cursor:grabbing; }
  .pump2 .p-bar{ width:96px; height:15px; border-radius:8px; background:linear-gradient(180deg,#c8c8c8,#6f6f6f);
    border:2px solid var(--shadow); box-shadow:inset 0 1px 0 #fff; }
  .pump2 .p-shaft{ width:10px; height:118px; margin:0 auto; border-radius:0 0 3px 3px;
    background:linear-gradient(90deg,#7a7a7a,#d8d8d8 50%,#7a7a7a); }
  .pump2 .p-cyl{ position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:76px; height:150px; z-index:2;
    background:#e7e3d4; border:3px solid #8a8a8a; border-radius:10px; overflow:hidden;
    box-shadow:inset 0 2px 5px rgba(0,0,0,.3); }
  .pump2 .p-fill{ position:absolute; left:0; right:0; bottom:0; background:linear-gradient(0deg,#23b03a,#7fe08a); }
  .pump2 .p-num{ position:absolute; left:0; right:0; top:10px; text-align:center; font-weight:700; font-size:24px;
    color:#3a3a3a; font-variant-numeric:tabular-nums; z-index:1; text-shadow:0 1px 0 rgba(255,255,255,.6); }
  /* LV 원주율 */
  .pi-wrap{ display:flex; flex-direction:column; gap:8px; }
  .pi-ref{ font-family:"Courier New",monospace; font-size:12px; color:#555; word-break:break-all;
    background:var(--field); padding:6px; max-height:64px; overflow:auto;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .pi-input{ font-family:"Courier New",monospace; font-size:16px; padding:7px; width:100%;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .pi-input.bad{ background:#ffdede; color:#a00; }
  /* LV 공쏟기 */
  .balls{ display:flex; justify-content:center; }
  .balls canvas{ background:#0c1418; image-rendering:auto; max-width:100%;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  /* LV 포대(대포) */
  .cannon{ display:flex; flex-direction:column; align-items:center; }
  .cannon canvas{ background:#0c1418; image-rendering:auto; max-width:100%; touch-action:none; cursor:pointer;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .cannon .hintline{ font-size:11px; color:var(--ink2); margin-top:4px; }
  /* LV 타이밍 잠금 */
  .timing{ position:relative; height:34px; background:var(--field); overflow:hidden; margin:6px 0 12px;
    border:2px solid; border-color:var(--shadow) var(--hilite) var(--hilite) var(--shadow); }
  .timing .ctarget{ position:absolute; top:0; bottom:0; width:4px; background:#0a8a30; }
  .timing .cmark{ position:absolute; top:0; bottom:0; width:5px; background:#cc0000; }
  /* 엔딩 = 시스템 종료 화면 */
  .shutdown{ background:var(--accent); color:#fff; text-align:center; padding:24px 10px; margin:-4px; }
  .shutdown .logo{ font-size:40px; }

  @media (prefers-reduced-motion: reduce){
    .panel.shake{ animation:none; }
    .badge.pop{ animation:none; }
    .readout.glitch{ animation:none; }
    .btn.ready{ animation:none; }
    .progress .seg.cur{ animation:none; }
    .confetti{ display:none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel" id="panel">
    <div class="hidden-skip" id="hiddenSkip" aria-hidden="true"></div>
    <div class="topbar">
      <span class="title">🔊 설정 · 소리</span>
      <div class="topbar-right">
        <span class="badge" id="badge">LV.1 정상</span>
        <button class="mute-btn" id="muteBtn" type="button" title="음소거" aria-pressed="false" aria-label="음소거">🔊</button>
      </div>
    </div>
    <div class="content">
      <div class="progress" id="progress" aria-label="진행도"></div>
      <div class="readout" id="readout"></div>
      <div class="goal" id="goal">볼륨을 50%에 맞추고 확인을 누르세요.</div>
      <div class="hintbar" id="hintbar" hidden></div>
      <div class="stage" id="stage"></div>
      <button class="btn" id="confirm">확인</button>
      <button class="btn secondary small" id="resetVol" style="margin-top:6px;">↺ 볼륨 0으로 초기화</button>
      <div class="taunt" id="taunt"></div>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============ 상수 ============ */
const TARGET = 50;            // 기본/폴백 목표값
const SEED = 12345;           // 랜덤 레벨 시드 고정 옵션
const HUE_START = 212, HUE_END = 320;

/* ============ 시드 랜덤 ============ */
let _seed = SEED;
function srand(){ _seed = (_seed*1103515245 + 12345) & 0x7fffffff; return _seed/0x7fffffff; }
const rnd = Math.random; // 게임플레이용 진짜 랜덤(룰렛 등)

/* 레벨마다 맞춰야 할 목표 볼륨%를 랜덤 추첨 (25~75, 5단위 → 모든 레벨에서 도달 가능) */
function pickTarget(){ return 25 + Math.floor(rnd()*11)*5; }

/* 원주율 소수점 아래 80자리 (LV.11) */
const PI_DIGITS = "14159265358979323846264338327950288419716939937510582097494459230781640628620899";

/* ============ BGM (레벨별 6곡, 반복재생) + 8비트 버튼 SFX ============ */
// 레벨 순서(LV.1~LV.6)에 맞춰 1곡씩 매칭. (3번째 파일은 원본명이 gbm3.mp3 라 그대로 사용)
const BGM_FILES = ['bgm1.mp3','bgm2.mp3','gbm3.mp3','bgm4.mp3','bgm5.mp3','bgm6.mp3'];
// 대용량 6곡(~14MB)을 한꺼번에 받지 않도록 지연 로딩. 각 곡은 처음 재생될 때 로드된다.
const bgmEls = BGM_FILES.map(f=>{ const a=new Audio(); a.src=f; a.loop=true; a.preload='none'; a.volume=0.5; return a; });
let currentBgm=null, audioUnlocked=false;
let muted=false, lastVol=0.5;   // 음소거 시에도 마지막 볼륨값을 기억해 해제 시 복원
function unlockAudio(){
  if(audioUnlocked) return; audioUnlocked=true;
  if(currentBgm && !muted) currentBgm.play().catch(()=>{});
}
['pointerdown','keydown'].forEach(ev=>addEventListener(ev, unlockAudio, {once:true}));
function playBgmFor(idx){
  const next = bgmEls[idx % bgmEls.length];
  if(currentBgm && currentBgm!==next){ currentBgm.pause(); currentBgm.currentTime=0; }
  currentBgm = next;
  currentBgm.volume = muted ? 0 : lastVol;
  if(audioUnlocked && !muted) currentBgm.play().catch(()=>{});
}
function setBgmVolumeFromDisplay(v){
  if(v==null || isNaN(v)) return;
  lastVol = Math.max(0, Math.min(100, v))/100;             // 볼륨 조절 값 = 실제 BGM 크기
  if(currentBgm) currentBgm.volume = muted ? 0 : lastVol;
}
function stopBgm(){ if(currentBgm){ currentBgm.pause(); } }

let sfxCtx=null;
function sfx8bit(freq=880, dur=0.05){
  if(muted) return;
  try{
    sfxCtx = sfxCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o=sfxCtx.createOscillator(), g=sfxCtx.createGain();
    o.type='square'; o.frequency.value=freq; g.gain.value=0.06;
    g.gain.setValueAtTime(0.06, sfxCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, sfxCtx.currentTime+dur);
    o.connect(g); g.connect(sfxCtx.destination);
    o.start(); o.stop(sfxCtx.currentTime+dur);
  }catch(e){}
}
document.addEventListener('pointerdown', e=>{
  if(e.target.closest('button, .knob, label')) sfx8bit(720 + Math.random()*180, 0.05);
});

/* 음소거 토글 버튼 */
const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', ()=>{
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  muteBtn.setAttribute('aria-pressed', String(muted));
  muteBtn.setAttribute('aria-label', muted ? '음소거 해제' : '음소거');
  if(currentBgm){
    if(muted){ currentBgm.volume = 0; }
    else { currentBgm.volume = lastVol; if(audioUnlocked) currentBgm.play().catch(()=>{}); }
  }
  if(spkEl) spkEl.textContent = spkGlyph(Math.round(lastVol*100));   // 디스플레이 스피커 아이콘 즉시 갱신
});

/* ============ DOM ============ */
const panel = document.getElementById('panel');
const badge = document.getElementById('badge');
const readoutEl = document.getElementById('readout');
/* 음악 플레이어풍 볼륨 디스플레이: 스피커 아이콘 + 숫자 + LED VU 미터 */
const VSEGS = 24;
let vsegEls = [], spkEl = null, vnumEl = null, vcheckEl = null, vtickEl = null;
function buildPlayer(){
  readoutEl.className = 'readout';
  readoutEl.innerHTML =
    `<div class="player-head">
       <span class="spk" id="spk">🔇</span>
       <span class="vnum" id="vnum">0</span><span class="vpct">%</span>
       <span class="vcheck" id="vcheck"></span>
     </div>
     <div class="vumeter" id="vumeter"><div class="vtick" id="vtick"></div></div>`;
  spkEl = readoutEl.querySelector('#spk'); vnumEl = readoutEl.querySelector('#vnum');
  vcheckEl = readoutEl.querySelector('#vcheck'); vtickEl = readoutEl.querySelector('#vtick');
  const meter = readoutEl.querySelector('#vumeter');
  vsegEls = [];
  for(let i=0;i<VSEGS;i++){ const s=document.createElement('div'); s.className='vseg'; meter.appendChild(s); vsegEls.push(s); }
}
function spkGlyph(v){ if(muted || v<1) return '🔇'; if(v<34) return '🔈'; if(v<67) return '🔉'; return '🔊'; }
function updateMeter(v){
  if(!vsegEls.length) return;
  const on = Math.round(Math.max(0,Math.min(100,v))/100*VSEGS);
  for(let i=0;i<VSEGS;i++){ const frac=i/VSEGS;
    vsegEls[i].className = 'vseg' + (i<on ? (' on'+(frac>=0.85?' hi':frac>=0.6?' mid':'')) : ''); }
}
buildPlayer();
const goalEl = document.getElementById('goal');
const stage = document.getElementById('stage');
const confirmBtn = document.getElementById('confirm');
const tauntEl = document.getElementById('taunt');

const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ============ 상태 ============ */
let state = {};
let rafId = null;        // 현재 레벨 애니메이션 루프
let level = null;        // 현재 레벨 정의

/* ============ 공통 유틸 ============ */
function setAccentHue(idx, total){
  const hue = HUE_START + (HUE_END - HUE_START) * (idx/(total-1));
  document.documentElement.style.setProperty('--accent', `hsl(${hue} 88% 52%)`);
  document.documentElement.style.setProperty('--accent-soft', `hsl(${hue} 88% 52% / .14)`);
}
function setReadout(v){
  const dn = (state && state.decimals)|0;                 // 소수 표시 자릿수(0=정수)
  const shown = dn>0 ? v.toFixed(dn) : Math.round(v);
  const tol = dn>0 ? 0.5*Math.pow(10,-dn) : 0;            // 2자리=±0.005 (그 자리까지 정확히)
  const hit = (state && state.target!=null &&
    (dn>0 ? Math.abs(v-state.target)<tol : Math.round(v)===state.target));
  if(vnumEl) vnumEl.textContent = shown;
  if(spkEl) spkEl.textContent = spkGlyph(v);
  if(vcheckEl) vcheckEl.textContent = hit ? '✓' : '';
  updateMeter(v);
  readoutEl.classList.toggle('hit', !!hit);
  // 확인 버튼이 "지금이야!" 신호를 주도록 (액션 어포던스)
  confirmBtn.classList.toggle('ready', !!hit);
  confirmBtn.textContent = hit ? '확인 ✓' : '확인';
  // 목표에 닿는 순간, 이전 실패 메시지(빨간 도발)가 남아 모순돼 보이는 문제 제거
  if(hit && tauntEl.classList.contains('fail')){ tauntEl.textContent=''; tauntEl.className='taunt'; }
  setBgmVolumeFromDisplay(v);   // 표시값 그대로 실제 BGM 음량에 반영
}
/* 막힘 방지용 힌트 (레벨 이름 키워드로 매칭) */
const HINTS = [
  ['도망', '커서가 다가가면 손잡이가 <b>도망</b>가요. 화면 끝으로 몰거나 재빨리 잡으세요.'],
  ['미로', '뒤섞인 숫자 중 <b>목표 숫자</b>를 찾아 클릭하면 돼요.'],
  ['랜턴', '어두운 영역을 <b>스크롤</b>하며 비춰 숨은 숫자를 찾고, 고른 숫자들의 <b>합</b>이 목표가 되게 하세요.'],
  ['일식', '달을 <b>아주 조금씩</b> 드래그하세요. 소수 둘째 자리까지 정확해야 통과!'],
  ['튜브', '<b>위아래로</b> 드래그해 가로 튜브를 기울이고, <b>수평으로 두면</b> 공이 멈춰요. 목표에서 멈추세요.'],
  ['펌프', '손잡이를 <b>위아래로 계속</b> 움직여 채우고, 목표에서 바로 확인하세요.'],
  ['공쏟기', '밸브를 <b>짧게 톡톡</b> 눌러 공 개수를 조절하세요. 한꺼번에 쏟으면 넘쳐요.'],
  ['타이밍', '마커가 좌우로 왕복해요. <b>목표 칸에 올 때 "멈추기"</b>를 누르세요.'],
  ['포대', '<b>오래 누를수록 멀리</b> 날아가요. 노란 깃발에 떨어지게 파워를 조절해 손을 떼세요.'],
];
function showHint(){
  const hb=document.getElementById('hintbar');
  const name=level.name||'';
  const found=HINTS.find(([k])=>name.includes(k));
  hb.innerHTML='💡 <b>힌트</b> — ' + (found ? found[1] : '천천히, 한 번 더 시도해 보세요.');
  hb.hidden=false;
}
function updateProgress(idx){
  const total = LEVELS.length;
  const p = document.getElementById('progress');
  let segs='';
  for(let i=0;i<total;i++){
    const cls = i<idx ? 'done' : (i===idx ? 'cur' : '');
    segs += `<span class="seg ${cls}"></span>`;
  }
  p.innerHTML = segs + `<span class="ptext">${idx+1} / ${total}</span>`;
}
function shake(){
  if(reduceMotion) return;
  panel.classList.remove('shake'); void panel.offsetWidth; panel.classList.add('shake');
}
function taunt(msg, kind){
  tauntEl.textContent = msg;
  tauntEl.className = 'taunt' + (kind ? ' '+kind : '');
}
function clearRaf(){ if(rafId){ cancelAnimationFrame(rafId); rafId=null; } }

/* 커스텀 슬라이더 생성기.
   opts: { reversed, slip, runaway, offset, onChange }
   value(0~100) 보관. 표시값 = reversed? 100-value : value, + offset */
function makeSlider(opts={}){
  const el = document.createElement('div');
  el.className = 'slider';
  el.innerHTML = `<div class="track"></div><div class="fill"></div>
    <div class="knob" tabindex="0" role="slider" aria-label="볼륨" aria-valuemin="0" aria-valuemax="100"></div>`;
  const track = el.querySelector('.track');
  const fill = el.querySelector('.fill');
  const knob = el.querySelector('.knob');
  const s = { el, knob, value:(opts.start!=null?opts.start:50), dragging:false, opts,  // 손잡이는 중앙(50)에서 시작
    displayValue(){
      let v = opts.reversed ? 100 - this.value : this.value;
      v += (opts.offset||0);
      return v;
    },
    setValue(v){ this.value = Math.max(0, Math.min(100, v)); render(); }
  };
  function render(){
    const w = el.clientWidth || 300;
    const px = (s.value/100) * w;
    knob.style.left = px + 'px';
    fill.style.width = px + 'px';
    knob.setAttribute('aria-valuenow', Math.round(s.displayValue()));
    // 이전 레벨에서 떼어진(detached) 슬라이더가 공용 리드아웃을 덮어쓰지 않도록 가드
    if(opts.onChange && el.isConnected) opts.onChange(s);
  }
  s.render = render;
  function valueFromX(clientX){
    const r = el.getBoundingClientRect();
    const raw = Math.max(0, Math.min(100, ((clientX - r.left)/r.width)*100));
    return opts.invert ? 100 - raw : raw;   // invert=손잡이가 마우스 방향과 반대로 이동
  }
  knob.addEventListener('pointerdown', e=>{
    e.preventDefault();
    knob.setPointerCapture(e.pointerId);
    s.dragging = true;
  });
  el.addEventListener('pointermove', e=>{
    if(!s.dragging) return;
    s.setValue(valueFromX(e.clientX));
  });
  function endDrag(e){ if(s.dragging){ s.dragging=false; if(opts.onRelease) opts.onRelease(s);} }
  knob.addEventListener('pointerup', endDrag);
  knob.addEventListener('pointercancel', endDrag);
  // 키보드
  knob.addEventListener('keydown', e=>{
    let d=0;
    if(e.key==='ArrowRight'||e.key==='ArrowUp') d=2;
    if(e.key==='ArrowLeft'||e.key==='ArrowDown') d=-2;
    if(d){ e.preventDefault(); if(opts.invert||opts.reversed) d=-d; s.setValue(s.value + d); }
  });
  requestAnimationFrame(render);
  return s;
}

/* 꽃가루 */
function confetti(){
  if(reduceMotion) return;
  const colors = ['#ff3b30','#ff9500','#ffcc00','#34c759','#007aff','#af52de','#ff2d55'];
  for(let i=0;i<80;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.background = colors[i%colors.length];
    c.style.animation = `fall ${1.6+Math.random()*1.8}s linear ${Math.random()*.6}s forwards`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 4500);
  }
}

/* ============ 레벨 정의 ============
   각 레벨: { name, goal, build(stage)->설정, getDisplay()->표시값 or null(자체 win),
              win() optional override, onConfirm() optional, pass(통과도발) } */
const LEVELS = [
/* 4: LV.5 도망 */{
  name:'LV.1 도망',
  pass:'버튼도 가끔은 당신을 피하고 싶어요.',
  build(){
    const sl = makeSlider({ onChange:s=>setReadout(s.displayValue()) });
    sl.knob.setAttribute('data-ico','🙂');
    stage.appendChild(sl.el); state.sl = sl;
    let calm;
    sl.el.addEventListener('pointermove', e=>{
      if(sl.dragging){ sl.knob.setAttribute('data-ico','😆'); return; }
      const r = sl.el.getBoundingClientRect();
      const knobX = r.left + (sl.value/100)*r.width;
      const dist = e.clientX - knobX;
      if(Math.abs(dist) < 60){
        sl.knob.setAttribute('data-ico','😨');           // 놀란 표정
        clearTimeout(calm); calm=setTimeout(()=>sl.knob.setAttribute('data-ico','🙂'),500);
        const push = dist>0 ? -1 : 1;                     // 반대로 도망(양 끝에선 잡힘)
        sl.setValue(sl.value + push*4);
      }
    });
  },
  getDisplay(){ return state.sl.displayValue(); }
},
/* LV.8 라디오 미로 */{
  name:'LV.2 미로',
  pass:'이 안에 50이 있긴 했죠? 거 봐요.',
  build(){
    state.picked = null;
    const win=document.createElement('div'); win.className='explorer';
    const head=document.createElement('div'); head.className='winhead';
    head.innerHTML='<span>🗂️ 볼륨 찾기 - 탐색기</span><span>▭ ✕</span>';
    const grid = document.createElement('div'); grid.className='maze';
    const nums=[...Array(100).keys()];
    for(let i=nums.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [nums[i],nums[j]]=[nums[j],nums[i]]; }
    nums.forEach(n=>{
      const lab=document.createElement('label');
      lab.innerHTML=`<input type="radio" name="maze" value="${n}">${n}`;
      lab.querySelector('input').onchange=()=>{
        grid.querySelectorAll('label').forEach(l=>l.classList.remove('sel'));
        lab.classList.add('sel'); state.picked=n;
      };
      grid.appendChild(lab);
    });
    win.append(head, grid);
    stage.appendChild(win);
    setReadout(0);
  },
  getDisplay(){ return state.picked==null ? -1 : state.picked; }
},
/* LV.15 랜턴 — 암흑 속 숫자 조합 */{
  name:'LV.3 랜턴',
  pass:'어둠 속에서도 숫자는 거짓말 안 하죠.',
  build(){
    goalEl.innerHTML=`어둠 속을 <b>스크롤</b>하며 숫자를 비춰 찾고, 합이 <span class="goal-target">${state.target}%</span>가 되도록 고르세요.`;
    state.sum=0; state.selected=new Set();
    const wrap=document.createElement('div'); wrap.className='lantern-wrap';
    const box=document.createElement('div'); box.className='lantern';
    const field=document.createElement('div'); field.className='lfield';
    const FIELD_H=1300;                  // 넓게 확장된 세로 스크롤 영역
    field.style.height=FIELD_H+'px';
    // 1단위로 다양한 숫자를 많이 흩뿌림 (작은 수 위주라 조합으로 목표 도달 가능)
    const COUNT=70;
    for(let i=0;i<COUNT;i++){
      const v=1+Math.floor(rnd()*12);    // 1~12, 1단위
      const n=document.createElement('div'); n.className='num'; n.textContent=v;
      n.style.left=(8+rnd()*84)+'%';
      n.style.top=(2+rnd()*96)+'%';
      n.onclick=()=>{
        if(state.selected.has(n)){ state.selected.delete(n); n.classList.remove('sel'); }
        else { state.selected.add(n); n.classList.add('sel'); }
        state.sum=[...state.selected].reduce((a,e)=>a+ +e.textContent,0);
        setReadout(state.sum);
      };
      field.appendChild(n);
    }
    box.appendChild(field);
    const beam=document.createElement('div'); beam.className='beam';
    const hint=document.createElement('div'); hint.className='scrollhint'; hint.textContent='↕ 스크롤';
    wrap.append(box, beam, hint);
    wrap.addEventListener('pointermove', e=>{
      const r=wrap.getBoundingClientRect();
      beam.style.setProperty('--mx',(e.clientX-r.left)+'px');
      beam.style.setProperty('--my',(e.clientY-r.top)+'px');
    });
    stage.appendChild(wrap);
    const clr=document.createElement('button'); clr.className='btn small secondary'; clr.textContent='선택 초기화';
    clr.style.marginTop='10px';
    clr.onclick=()=>{ state.selected.forEach(n=>n.classList.remove('sel')); state.selected.clear(); state.sum=0; setReadout(0); };
    stage.appendChild(clr);
    setReadout(0);
  },
  getDisplay(){ return state.sum; }
},
/* LV.7 일식 — 두 원의 교집합 면적 = 볼륨 */{
  name:'LV.4 일식',
  pass:'해와 달이 겹치듯, 볼륨도 겹쳤네요.',
  fail:'소수점 둘째 자리까지 정확히! 아주 미세하게 움직이세요.',
  win(d){ return d!=null && Math.abs(d-state.target)<0.005; },   // 0.01 단위, 둘째 자리까지 정확히
  build(){
    state.decimals=2;                                            // 0.01 단위로 표시·판정
    goalEl.innerHTML=`달을 움직여 가려진 면적을 <span class="goal-target">${state.target}%</span>로. <b>소수점 둘째 자리(0.01)까지 정확히</b> 맞춰야 통과!`;
    const box=document.createElement('div'); box.className='eclipse';
    const R=44, cx0=100, cy0=64;
    box.innerHTML=`<svg viewBox="0 0 200 128">
      <circle cx="${cx0}" cy="${cy0}" r="${R}" fill="#ffcb33" stroke="#c79a00" stroke-width="1.5"/>
      <circle id="ecMoon" cx="36" cy="64" r="${R}" fill="#33333f" stroke="#000" stroke-width="1.5"/>
    </svg>`;
    stage.appendChild(box);
    const svg=box.querySelector('svg'), moon=box.querySelector('#ecMoon');
    state.moon={x:36,y:64}; state.eclipse=0;
    const full=Math.PI*R*R;
    function area(d){ if(d>=2*R) return 0; if(d<=0) return full;
      return 2*R*R*Math.acos(d/(2*R)) - (d/2)*Math.sqrt(Math.max(0,4*R*R-d*d)); }
    function pctAt(d){ return area(d)/full*100; }
    function draw(){ moon.setAttribute('cx',state.moon.x); moon.setAttribute('cy',state.moon.y); setReadout(state.eclipse); }
    function setFromMoon(){ const dx=state.moon.x-cx0, dy=state.moon.y-cy0;
      state.eclipse=Math.round(pctAt(Math.hypot(dx,dy))*100)/100; draw(); }   // 0.01 격자에 스냅
    let dragging=false, lastX=0, lastY=0;
    const FINE=0.13;                            // 매우 둔감하게 → 미세 드래그로 0.01 조절
    function toSvg(e){ const r=svg.getBoundingClientRect();
      return {x:(e.clientX-r.left)/r.width*200, y:(e.clientY-r.top)/r.height*128}; }
    moon.addEventListener('pointerdown',e=>{ dragging=true; const p=toSvg(e); lastX=p.x; lastY=p.y; moon.setPointerCapture(e.pointerId); });
    svg.addEventListener('pointermove',e=>{ if(!dragging)return; const p=toSvg(e);
      state.moon.x=Math.max(0,Math.min(200,state.moon.x+(p.x-lastX)*FINE));
      state.moon.y=Math.max(0,Math.min(128,state.moon.y+(p.y-lastY)*FINE));
      lastX=p.x; lastY=p.y; setFromMoon(); });
    const end=()=>dragging=false; moon.addEventListener('pointerup',end); moon.addEventListener('pointercancel',end);
    setFromMoon();
  },
  getDisplay(){ return state.eclipse; }
},
/* LV.9 시소 — 값이 클수록 더 빨리 미끄러져 내려감 */{
  name:'LV.5 튜브',
  pass:'굴러다니는 공을 딱 멈춰 세우다니, 신기 들었네요.',
  build(){
    goalEl.innerHTML=`튜브를 <b>위아래로</b> 움직여 기울이고, 굴러다니는 공을 <span class="goal-target">${state.target}%</span> 위치에 멈춰 세우세요. (수평이면 멈춰요)`;
    state.bal=20; state.tvel=0; state.tilt=0;
    const wrap=document.createElement('div'); wrap.className='tube-wrap';
    const tube=document.createElement('div'); tube.className='tube';
    const tgt=document.createElement('div'); tgt.className='ttarget'; tgt.style.left=state.target+'%';
    const ball=document.createElement('div'); ball.className='tball';
    tube.append(tgt, ball); wrap.appendChild(tube); stage.appendChild(wrap);
    const MAXDEG=18, K=200, FRIC=2, ENDR=0.4;
    let dragging=false;
    function setTiltFromY(e){ const r=wrap.getBoundingClientRect();
      const rel=((e.clientY-r.top)/r.height-0.5)*2;            // 세로 드래그로 기울기: 아래=+, 위=−
      state.tilt=Math.max(-1,Math.min(1,rel))*MAXDEG; }
    wrap.addEventListener('pointerdown',e=>{ dragging=true; wrap.setPointerCapture(e.pointerId); setTiltFromY(e); });
    wrap.addEventListener('pointermove',e=>{ if(dragging) setTiltFromY(e); });
    const end=()=>dragging=false; wrap.addEventListener('pointerup',end); wrap.addEventListener('pointercancel',end);
    let last=performance.now();
    function loop(t){ const dt=Math.min(0.032,(t-last)/1000); last=t;
      if(!dragging) state.tilt*=Math.pow(0.02,dt);              // 손 떼면 수평으로 복귀
      const rad=state.tilt*Math.PI/180;
      state.tvel += K*Math.sin(rad)*dt;                         // 기운 쪽으로 가속
      state.tvel -= state.tvel*FRIC*dt;                         // 마찰(수평이면 곧 정지)
      state.bal += state.tvel*dt;
      if(state.bal<0){ state.bal=0; state.tvel=-state.tvel*ENDR; }
      if(state.bal>100){ state.bal=100; state.tvel=-state.tvel*ENDR; }
      tube.style.transform=`rotate(${state.tilt}deg)`;
      ball.style.left=state.bal+'%';
      setReadout(state.bal);
      rafId=requestAnimationFrame(loop);
    }
    rafId=requestAnimationFrame(loop);
  },
  getDisplay(){ return state.bal; }
},
/* LV.10 펌프 — 손잡이를 위아래로 드래그해 공기압을 채움, 계속 새어나감 */{
  name:'LV.6 펌프',
  pass:'바람 넣느라 팔 빠지는 줄 알았죠?',
  build(){
    goalEl.innerHTML=`T손잡이를 아래로 펌프질(1회 +2)해 <span class="goal-target">${state.target}%</span>까지. (계속 새어 나갑니다)`;
    state.air=0;
    const box=document.createElement('div'); box.className='pump2';
    box.innerHTML=`<div class="p-handle"><div class="p-bar"></div><div class="p-shaft"></div></div>
      <div class="p-cyl"><div class="p-fill"></div><div class="p-num">0</div></div>`;
    stage.appendChild(box);
    const handle=box.querySelector('.p-handle'), fill=box.querySelector('.p-fill'), num=box.querySelector('.p-num');
    const MAX_STROKE=58;
    let dragging=false, lastY=0, hy=0, armed=true;
    handle.addEventListener('pointerdown',e=>{ dragging=true; lastY=e.clientY; handle.setPointerCapture(e.pointerId); });
    handle.addEventListener('pointermove',e=>{ if(!dragging)return; const dy=e.clientY-lastY; lastY=e.clientY;
      hy=Math.max(0,Math.min(MAX_STROKE,hy+dy)); handle.style.transform=`translateX(-50%) translateY(${hy}px)`;
      if(armed && hy>=MAX_STROKE*0.75){ state.air=Math.min(100, state.air+2); armed=false; }  // 펌프질 1회 = +2
      if(hy<=MAX_STROKE*0.25) armed=true;                                                       // 위로 올리면 재장전
    });
    const end=()=>dragging=false; handle.addEventListener('pointerup',end); handle.addEventListener('pointercancel',end);
    let last=performance.now();
    function loop(t){ const dt=(t-last)/1000; last=t;
      state.air=Math.max(0, state.air - 5*dt);   // 바람 빠짐
      if(!dragging && hy>0){ hy=Math.max(0,hy-MAX_STROKE*4*dt);
        handle.style.transform=`translateX(-50%) translateY(${hy}px)`; }   // 손잡이 복귀
      fill.style.height=state.air+'%'; num.textContent=Math.round(state.air);
      setReadout(state.air);
      rafId=requestAnimationFrame(loop);
    }
    rafId=requestAnimationFrame(loop);
  },
  getDisplay(){ return state.air; }
},
/* LV.12 공쏟기 — 통 안의 공 개수 = 볼륨 (물리 시뮬레이션) */{
  name:'LV.7 공쏟기',
  pass:'공 개수까지 맞추다니… 집착이 예술이에요.',
  build(){
    goalEl.innerHTML=`통 안의 공 개수를 <span class="goal-target">${state.target}</span>개로 맞추세요. (100개 넘으면 넘쳐요)`;
    const wrap=document.createElement('div'); wrap.className='balls';
    const cv=document.createElement('canvas'); cv.width=300; cv.height=210; wrap.appendChild(cv);
    const valve=document.createElement('button'); valve.className='btn'; valve.textContent='🚰 밸브 (한 번 누를 때마다 공 투입)';
    stage.append(wrap, valve);
    const ctx=cv.getContext('2d'), W=cv.width, H=cv.height;
    const box={x:96,y:60,w:108,h:140}, R=5, G=560, REST=0.2, CAP=100, MAXV=520;
    state.balls=[];
    function spawn(){ if(state.balls.length<260) state.balls.push({x:box.x+R+Math.random()*(box.w-2*R), y:box.y+R+2, vx:(Math.random()-.5)*40, vy:20}); }
    // 누르고 있어도 더 안 나오고, 한 번 누를 때마다 한 개씩만 투입
    valve.addEventListener('click', spawn);
    let last=performance.now();
    function loop(t){ const dt=Math.min(0.032,(t-last)/1000); last=t;
      const b=state.balls;
      const lid = b.length<=CAP;          // 100개 이하면 윗면이 막혀 넘치지 않음, 초과 시 윗면 열려 넘침
      for(const o of b){
        o.vy+=G*dt; o.x+=o.vx*dt; o.y+=o.vy*dt;
        if(lid){                          // 100개 이하: 완전 밀폐 → 절대 새지 않음
          if(o.x<box.x+R){ o.x=box.x+R; o.vx=-o.vx*REST; }
          if(o.x>box.x+box.w-R){ o.x=box.x+box.w-R; o.vx=-o.vx*REST; }
          if(o.y>box.y+box.h-R){ o.y=box.y+box.h-R; o.vy=-o.vy*REST; o.vx*=0.98; }
          if(o.y<box.y+R){ o.y=box.y+R; if(o.vy<0) o.vy=-o.vy*REST; }   // 윗면 뚜껑(넘침 방지)
        } else {                          // 100개 초과: 윗면 열림 → 넘쳐 흐름
          const inX=o.x>box.x && o.x<box.x+box.w;
          if(inX && o.y>box.y){
            if(o.x<box.x+R){ o.x=box.x+R; o.vx=-o.vx*REST; }
            if(o.x>box.x+box.w-R){ o.x=box.x+box.w-R; o.vx=-o.vx*REST; }
            if(o.y>box.y+box.h-R){ o.y=box.y+box.h-R; o.vy=-o.vy*REST; o.vx*=0.98; }
          }
        }
      }
      // 공끼리 충돌(분리) — 안정성을 위해 2회 이완
      for(let pass=0; pass<2; pass++)
      for(let i=0;i<b.length;i++) for(let j=i+1;j<b.length;j++){
        const a=b[i],c=b[j], dx=c.x-a.x, dy=c.y-a.y, dd=dx*dx+dy*dy, min=2*R;
        if(dd<min*min && dd>0){ const dist=Math.sqrt(dd), ov=(min-dist)/2, nx=dx/dist, ny=dy/dist;
          a.x-=nx*ov; a.y-=ny*ov; c.x+=nx*ov; c.y+=ny*ov;
          const dvx=c.vx-a.vx, dvy=c.vy-a.vy, p=(dvx*nx+dvy*ny)*REST;
          if(p<0){ a.vx+=p*nx; a.vy+=p*ny; c.vx-=p*nx; c.vy-=p*ny; } }
      }
      // 감쇠 + 속도 제한 + 잠재우기 → 쌓인 공이 날뛰지 않고 가라앉음
      for(const o of b){
        o.vx*=0.94; o.vy*=0.97;
        const sp=Math.hypot(o.vx,o.vy);
        if(sp>MAXV){ o.vx*=MAXV/sp; o.vy*=MAXV/sp; }   // 폭발 방지(과밀 스폰 시)
        if(sp<6){ o.vx*=0.4; o.vy*=0.4; }              // 느린 공은 빠르게 정지
      }
      state.balls=b.filter(o=>o.y<H+30 && o.x>-30 && o.x<W+30);
      let cnt=0; for(const o of state.balls) if(o.x>box.x&&o.x<box.x+box.w&&o.y>box.y&&o.y<box.y+box.h) cnt++;
      state.count=cnt; setReadout(cnt);
      // draw
      ctx.clearRect(0,0,W,H);
      ctx.strokeStyle='#7fd0ff'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(box.x,box.y); ctx.lineTo(box.x,box.y+box.h);
      ctx.lineTo(box.x+box.w,box.y+box.h); ctx.lineTo(box.x+box.w,box.y); ctx.stroke();
      ctx.fillStyle='#ffcc33';
      for(const o of state.balls){ ctx.beginPath(); ctx.arc(o.x,o.y,R,0,7); ctx.fill(); }
      rafId=requestAnimationFrame(loop);
    }
    rafId=requestAnimationFrame(loop);
  },
  getDisplay(){ return state.count||0; }
},
/* LV.15 타이밍 잠금 — 좌우로 휙휙 지나가는 마커를 목표에서 멈추기 */{
  name:'LV.8 타이밍',
  pass:'반사신경 인정합니다.',
  build(){
    goalEl.innerHTML=`움직이는 마커를 <span class="goal-target">${state.target}%</span>에서 멈추세요.`;
    state.sweep=0; state.dir=1; state.frozen=false;
    const bar=document.createElement('div'); bar.className='timing';
    const tgt=document.createElement('div'); tgt.className='ctarget'; tgt.style.left='calc('+state.target+'% - 2px)';
    const mark=document.createElement('div'); mark.className='cmark';
    bar.append(tgt, mark); stage.appendChild(bar);
    const lock=document.createElement('button'); lock.className='btn'; lock.textContent='⏹ 멈추기 / 다시';
    lock.onclick=()=>{ state.frozen=!state.frozen; setReadout(state.sweep); };
    stage.appendChild(lock);
    let last=performance.now();
    function loop(t){ const dt=Math.min(0.05,(t-last)/1000); last=t;
      if(!state.frozen){ state.sweep+=state.dir*70*dt;

/* LV.14 포대 — 포트리스식 대포: 누르는 동안 파워 충전, 떼면 발사, 날아간 거리=볼륨 */{
  name:'LV.9 포대',
  pass:'포격술 한번 끝내주네요. 💥',
  fail:'착탄 지점이 빗나갔어요. 파워를 조절해 다시 쏘세요.',
  win(d){ return d!=null && Math.abs(d-state.target)<=2; },   // 물리 발사라 ±2% 허용
  build(){
    goalEl.innerHTML=`대포를 쏴 포탄을 <span class="goal-target">${state.target}%</span> 거리에 떨어뜨리세요. (누르면 충전, 떼면 발사)`;
    state.cannon=0;
    const wrap=document.createElement('div'); wrap.className='cannon';
    const cv=document.createElement('canvas'); cv.width=300; cv.height=190;
    const tip=document.createElement('div'); tip.className='hintline'; tip.textContent='💥 캔버스를 누른 채로 파워를 모았다가 손을 떼세요';
    wrap.append(cv, tip); stage.append(wrap);
    const ctx=cv.getContext('2d'), W=cv.width, H=cv.height;
    const G=420, gy=H-22, cx=30, maxDist=W-cx-22, K=Math.sqrt(maxDist*G); // 파워100=최대사거리
    let power=0, charging=false, ball=null, settled=false;
    function fire(){
      if(!charging) return; charging=false;
      const v0=(power/100)*K, a=Math.PI/4;            // 45도 고정 발사각
      ball={x:cx, y:gy-14, vx:v0*Math.cos(a), vy:-v0*Math.sin(a)};
      settled=false;
    }
    cv.addEventListener('pointerdown',e=>{ cv.setPointerCapture(e.pointerId); charging=true; power=0; ball=null; });
    cv.addEventListener('pointerup',fire); cv.addEventListener('pointercancel',fire);
    let last=performance.now();
    function loop(t){ const dt=Math.min(0.032,(t-last)/1000); last=t;
      if(charging){ power=Math.min(100, power+85*dt); }       // 누르는 동안 충전(약 1.2초에 만충)
      if(ball && !settled){
        ball.vy+=G*dt; ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
        if(ball.y>=gy-3){ ball.y=gy-3; settled=true;
          const dist=Math.max(0,Math.min(maxDist, ball.x-cx));
          state.cannon=dist/maxDist*100; setReadout(state.cannon);   // 날아간 거리 = 볼륨
        }
      }
      // draw
      ctx.clearRect(0,0,W,H);
      // 지면
      ctx.fillStyle='#2a4d2a'; ctx.fillRect(0,gy,W,H-gy);
      ctx.strokeStyle='#5fa05f'; ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
      // 목표 깃발
      const tx=cx+state.target/100*maxDist;
      ctx.strokeStyle='#ffcc33'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(tx,gy); ctx.lineTo(tx,gy-34); ctx.stroke();
      ctx.fillStyle='#ffcc33'; ctx.beginPath(); ctx.moveTo(tx,gy-34); ctx.lineTo(tx+16,gy-28); ctx.lineTo(tx,gy-22); ctx.fill();
      // 대포(45도 포신)
      ctx.save(); ctx.translate(cx,gy-6); ctx.rotate(-Math.PI/4);
      ctx.fillStyle='#888'; ctx.fillRect(0,-5,26,10); ctx.restore();
      ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(cx,gy-4,9,0,7); ctx.fill();
      // 파워 게이지
      ctx.fillStyle='#222'; ctx.fillRect(8,8,14,90);
      ctx.fillStyle=power<70?'#3aa856':'#cc3030'; ctx.fillRect(8,8+90*(1-power/100),14,90*(power/100));
      ctx.strokeStyle='#aaa'; ctx.lineWidth=1; ctx.strokeRect(8,8,14,90);
      // 포탄
      if(ball){ ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(ball.x,ball.y,5,0,7); ctx.fill(); }
      rafId=requestAnimationFrame(loop);
    }
    rafId=requestAnimationFrame(loop);
  },
  getDisplay(){ return state.cannon; }
}
];
/* (LV.15 볼륨 몬스터 보스 — 삭제됨. 마지막 레벨 통과 시 바로 엔딩) */

function showEnding(){
  clearRaf();
  stopBgm();   // 정복 완료 = 진짜 음소거
  confirmBtn.style.display='none';
  confirmBtn.classList.remove('ready');
  badge.textContent='CLEAR';
  document.getElementById('progress').innerHTML =
    Array.from({length:LEVELS.length},()=>'<span class="seg done"></span>').join('')
    + '<span class="ptext">CLEAR!</span>';
  goalEl.textContent='';
  readoutEl.className='readout';
  readoutEl.innerHTML='<div class="player-off">🔇</div>';
  stage.innerHTML='';
  const e=document.createElement('div'); e.className='ending';
  e.innerHTML=`<div class="shutdown">
      <div class="logo">🔇</div>
      <div class="big" style="color:#fff">볼륨 정복 완료</div>
      <div class="sub" style="color:#dfe">이제 시스템을 종료해도 안전합니다.</div>
    </div>
    <div class="sub" style="margin-top:12px">당신은 세상에서 가장 쓸모없는 볼륨바를 정복했습니다.</div>
    <div class="cert">— 본 수료증은 당신의 인내심을 영원히 증명합니다 —</div>`;
  const again=document.createElement('button'); again.className='btn'; again.textContent='다시 도전';
  again.onclick=()=>loadLevel(0);
  e.appendChild(again);
  stage.appendChild(e);
  confetti();
  tauntEl.textContent='';
}

/* ============ 레벨 로딩 ============ */
function loadLevel(idx, keepTarget){
  if(level && level.cleanup) try{ level.cleanup(); }catch(e){}
  clearRaf();
  state = {};
  level = LEVELS[idx];
  state.levelIndex = idx;
  // keepTarget(숫자)이 주어지면 목표를 유지(= 같은 레벨을 0으로 재시작), 아니면 새 목표
  state.target = keepTarget != null ? keepTarget
               : (level.fixedTarget != null ? level.fixedTarget : pickTarget());  // 목표% 랜덤
  setAccentHue(idx, LEVELS.length);
  playBgmFor(idx);   // 레벨마다 다른 BGM 반복재생
  // UI 리셋
  confirmBtn.style.display='';
  confirmBtn.classList.remove('ready'); confirmBtn.textContent='확인';
  document.getElementById('hintbar').hidden=true;
  goalEl.innerHTML=`볼륨을 <span class="goal-target">${state.target}%</span>에 맞추고 확인을 누르세요.`;
  stage.innerHTML='';
  tauntEl.textContent=''; tauntEl.className='taunt';
  buildPlayer();
  vtickEl.style.left = state.target + '%';   // VU 미터 위 목표 지점 표식
  updateMeter(0);
  badge.textContent=level.name;
  badge.classList.remove('pop'); void badge.offsetWidth; badge.classList.add('pop');
  updateProgress(idx);
  level.build(stage);
}

confirmBtn.addEventListener('click', ()=>{
  if(level.onConfirmGuard && !level.onConfirmGuard()){
    shake(); taunt('먼저 잠금을 해제하세요.','fail'); return;
  }
  let ok;
  if(level.win){
    const d = level.getDisplay ? level.getDisplay() : null;
    ok = level.win(d);
  } else {
    const d = level.getDisplay();
    ok = Math.round(d) === state.target;
  }
  if(ok){
    advance();
  } else {
    shake();
    const d = level.getDisplay ? level.getDisplay() : null;
    const cur = (d!=null && d>=0) ? Math.round(d) : '?';
    taunt(level.fail || `${state.target}%가 아니에요. (현재 ${cur}%)`, 'fail');
    if(level.onFail) level.onFail();
    state.fails = (state.fails||0) + 1;     // 3번 이상 실패하면 힌트 노출
    if(state.fails >= 3) showHint();
  }
});

/* 볼륨 0으로 초기화: 목표는 그대로 두고 현재 레벨만 처음 상태로 되돌림 */
document.getElementById('resetVol').addEventListener('click', ()=>{
  if(!level) return;
  loadLevel(state.levelIndex, state.target);
  taunt('볼륨을 0으로 되돌렸어요.', '');
});

/* 통과 → 다음 레벨/엔딩 */
function advance(){
  taunt(level.pass || '', 'win');
  const next = state.levelIndex + 1;
  if(next < LEVELS.length) setTimeout(()=>loadLevel(next), 850);
  else setTimeout(showEnding, 850);
}

/* 히든 스킵: 좌상단 10x10px를 7연속 클릭하면 다음 단계로 (보스/엔딩 없으므로 advance만 사용) */
(function hiddenSkip(){
  const spot = document.getElementById('hiddenSkip');
  let count = 0, resetTimer = null;
  const RESET_MS = 1200;     // 이 시간 안에 다음 클릭이 없으면 카운트 초기화
  spot.addEventListener('pointerdown', e=>{
    e.stopPropagation();
    count++;
    clearTimeout(resetTimer);
    if(count >= 7){
      count = 0;
      if(badge.textContent !== 'CLEAR') advance();
    } else {
      resetTimer = setTimeout(()=>{ count = 0; }, RESET_MS);
    }
  });
})();

/* 시작 */
loadLevel(0);
</script>
